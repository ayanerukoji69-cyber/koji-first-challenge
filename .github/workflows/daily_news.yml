name: Daily News Research

on:
  schedule:
    - cron: '0 23 * * *' # UTC 23:00 = 日本時間 翌朝8:00
  workflow_dispatch: # 手動実行用ボタンも作ります

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 警告が出ないよう3.10にアップグレード

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 鍵を渡す設定
        run: python main.py
